<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>MyFinance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h1 class="logo">MyFinance</h1>
    <nav>
      <button class="nav active" id="btn-dashboard" onclick="showTab('dashboard')">💰 Saldo</button>
      <button class="nav" id="btn-transacoes" onclick="showTab('transacoes')">💳 Histórico</button>
      <button class="nav" id="btn-despesas" onclick="showTab('despesas')">📊 Lançamentos</button>
      <button class="nav" id="btn-config" onclick="showTab('config')">⚙️ Configurações</button>
    </nav>
  </aside>

  <main class="content">
    <section id="dashboard" class="tab active">
      <h2 class="mes" id="nomeMes">Abril</h2>
      <h1 class="saldo-total" id="resumoSaldo">R$ 0,00</h1>

      <div class="cards">
        <div class="card receita">
          <span>Receitas (Fixo + Bicos)</span>
          <strong id="resumoReceitas">R$ 0,00</strong>
        </div>
        <div class="card despesa">
          <span>Despesas</span>
          <strong id="resumoDespesas">R$ 0,00</strong>
        </div>
      </div>

      <div class="painel">
        <div class="box">
          <h3>Gráfico de Gastos</h3>
          <canvas id="graficoDashboard"></canvas>
        </div>
        <div class="box">
          <ul class="lista" id="listaResumo">
            </ul>
        </div>
      </div>
    </section>

    <section id="despesas" class="tab">
      <h2>Lançar Valor</h2>
      <div class="painel">
        <div class="box">
          <h3>Entradas e Saídas</h3>
          <input type="text" id="descLancamento" placeholder="Descrição (Ex: Salário, Bico, Uber)">
          <input type="number" id="valorLancamento" placeholder="Valor (R$)">
          <select id="tipoLancamento">
            <option value="receita">Receita (Ganho)</option>
            <option value="despesa">Despesa (Gasto)</option>
          </select>
          <select id="catLancamento">
            <option value="Educação">Educação</option>
            <option value="Alimentação">Alimentação</option>
            <option value="Transporte">Transporte</option>
            <option value="Academia">Academia</option>
            <option value="Outros">Outros</option>
          </select>
          <button class="btn-acao" onclick="adicionarNovo()">Salvar Lançamento</button>
        </div>
      </div>
    </section>

    <section id="transacoes" class="tab">
      <h2>Histórico do Ano</h2>
      <div class="box">
        <ul class="lista" id="listaHistorico">
          </ul>
      </div>
    </section>

    <section id="config" class="tab">
      <h2>Configurações</h2>
      <div class="box">
        <button onclick="limparTudo()" style="background:#ff4b4b; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">Apagar todos os meses/anos</button>
        <p style="margin-top:10px; color:#666;">Isso limpará todos os seus dados permanentemente.</p>
      </div>
    </section>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
