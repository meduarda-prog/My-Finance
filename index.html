<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>MyFinance</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<aside class="sidebar">

<h1 class="logo">MyFinance</h1>

<nav>

<button class="nav" onclick="showTab('dashboard')">💰 Saldo</button>

<button class="nav" onclick="showTab('despesas')">📊 Despesas</button>

<button class="nav">💳 Transações</button>

<button class="nav">⚙️ Configurações</button>

</nav>

</aside>



<main class="content">

<section id="dashboard" class="tab">

<h2 class="mes"></h2>

<h1 class="saldo-total" id="saldoTotal">R$ 0</h1>

<div class="cards">

<div class="card receita">

<span>Receitas</span>

<strong id="receitaTotal">R$ 0</strong>

</div>

<div class="card despesa">

<span>Despesas</span>

<strong id="despesaTotal">R$ 0</strong>

</div>

</div>



<div class="painel">

<div class="box">

<h3>Despesas por categoria</h3>

<canvas id="grafico"></canvas>

</div>



<div class="box">

<ul class="lista" id="listaCategorias">

<li onclick="editarValor(0)">Educação — R$ 0</li>

<li onclick="editarValor(1)">Alimentação — R$ 0</li>

<li onclick="editarValor(2)">Transporte — R$ 0</li>

<li onclick="editarValor(3)">Academia — R$ 0</li>

<li onclick="editarValor(4)">Outros — R$ 0</li>

</ul>

</div>

</div>

</section>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
