<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>MyFinance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="app">

<aside class="sidebar">

<h1 class="logo">MyFinance</h1>

<nav>

<button class="nav" onclick="showTab('dashboard')">
💰 Saldo
</button>

<button class="nav" onclick="showTab('transacoes')">
💳 Transações
</button>

<button class="nav" onclick="showTab('despesas')">
📊 Despesas
</button>

<button class="nav" onclick="showTab('config')">
⚙️ Configurações
</button>

</nav>

</aside>



<main class="content">


<section id="dashboard" class="tab">

<h2 class="mes"></h2>

<h1 class="saldo-total" id="saldoTotal">R$ 0</h1>

<div class="cards">

<div class="card receita">
<span>Receitas</span>
<strong id="totalReceitas">R$ 0</strong>
</div>

<div class="card despesa">
<span>Despesas</span>
<strong id="totalDespesas">R$ 0</strong>
</div>

</div>


<div class="box">

<h3>Adicionar Receita</h3>

<input id="descricaoReceita" placeholder="Descrição">

<input id="valorReceita" type="number" placeholder="Valor">

<button onclick="adicionarReceita()">
Adicionar
</button>

</div>

</section>




<section id="despesas" class="tab">

<h2>Despesas</h2>

<div class="box">

<h3>Adicionar Despesa</h3>

<input id="descricaoDespesa" placeholder="Descrição">

<input id="valorDespesa" type="number" placeholder="Valor">

<select id="categoriaDespesa">

<option>Educação</option>
<option>Alimentação</option>
<option>Transporte</option>
<option>Academia</option>
<option>Outros</option>

</select>

<button onclick="adicionarDespesa()">
Adicionar
</button>

</div>


<div class="painel">

<div class="box">

<h3>Despesas por categoria</h3>

<canvas id="graficoDespesas"></canvas>

</div>


<div class="box">

<ul id="listaDespesas"></ul>

</div>

</div>

</section>




<section id="transacoes" class="tab">

<h2>Transações</h2>

<p>Em construção</p>

</section>




<section id="config" class="tab">

<h2>Configurações</h2>

<p>Em construção</p>

</section>



</main>

</div>

<script src="app.js"></script>

</body>

</html>
