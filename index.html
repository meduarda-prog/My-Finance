<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>MyFinance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

<aside class="sidebar">

<h1 class="logo">MyFinance</h1>

<nav>

<button class="nav" onclick="showTab('dashboard')">💰 Saldo</button>

<button class="nav" onclick="showTab('despesas')">📊 Despesas</button>

<button class="nav" onclick="showTab('transacoes')">💳 Transações</button>

<button class="nav" onclick="showTab('config')">⚙️ Configurações</button>

</nav>

</aside>

<main class="content">

<section id="dashboard" class="tab">

<h2 class="mes"></h2>

<h1 class="saldo-total">R$ 0</h1>

<div class="cards">

<div class="card receita">
<span>Receitas</span>
<strong>R$ 0</strong>
</div>

<div class="card despesa">
<span>Despesas</span>
<strong id="totalDespesas">R$ 0</strong>
</div>

</div>

<div class="painel">

<div class="box">

<h3>Despesas por categoria</h3>

<canvas id="grafico"></canvas>

</div>

<div class="box">

<ul class="lista" id="listaCategorias"></ul>

</div>

</div>

</section>


<section id="despesas" class="tab">

<h2>Despesas</h2>

<p>Clique nas categorias para alterar os valores.</p>

</section>


<section id="transacoes" class="tab">

<h2>Transações</h2>

<p>Em construção</p>

</section>


<section id="config" class="tab">

<h2>Configurações</h2>

<p>Em construção</p>

</section>


</main>

</div>

<script src="app.js"></script>

</body>
</html>
